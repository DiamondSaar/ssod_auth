services:
  ssod_auth_db:
    image: postgres:16-alpine
    container_name: ssod_auth_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ssod_auth_pgdata:/var/lib/postgresql/data
    networks:
      - ssod_auth_net

  ssod_auth_web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ssod_auth_web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - ssod_auth_db
    ports:
      - "127.0.0.1:8010:8000"
    networks:
      - ssod_auth_net

volumes:
  ssod_auth_pgdata:

networks:
  ssod_auth_net:
    name: ssod_auth_net
