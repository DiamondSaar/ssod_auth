services:
  ssod_auth_db:
    image: postgres:16-alpine
    container_name: ssod_auth_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ssod_auth_pgdata:/var/lib/postgresql/data
    networks:
      - ssod_auth_net

  ssod_auth_web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ssod_auth_web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - ssod_auth_db
    ports:
      - "127.0.0.1:8010:8000"
    volumes:
      - ./app:/app

    networks:
      ssod_auth_net:
        # Django's Host-header validation (RFC 1034/1035) rejects
        # underscores outright, so "ssod_auth_web" itself can never appear
        # in a Host header no matter what's in ALLOWED_HOSTS - this hyphenated
        # alias is what Dominex's admin write-bridge actually calls (see
        # SSOD_AUTH_INTERNAL_URL in dominex/app/config.py).
        aliases:
          - ssod-auth-internal

volumes:
  ssod_auth_pgdata:

networks:
  ssod_auth_net:
    name: ssod_auth_net
